<!DOCTYPE <html>
<html>
    <head>
        <link rel = "stylesheet" href = "./To-Do-styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    </head>
    <body>
        <div id = "navigation">
            <div id = "logo_container">
                <a href = "./To-Do.html"><img src = "images/Pomodoro_Planner_Logo.png" id = "logo"></a>
                <h1><a href = "./To-Do.html">Pomodoro Planner</a></h1>
            </div>
            <nav id = "navbar">
                <ul id = "menu">
                    <ul id = "menu">
                        <li class = "menu_item"><a href = "./index.html">Logout</a></li>
                        <li class = "menu_item"><a href = "./analytics.html">Analytics</a></li>
                        <li class = "menu_item"><a href = "./pomodoro.html">Work</a></li>
                        <li class = "menu_item"><a href = "./To-Do.html">To-Do</a></li>
                    </ul>
                </ul>
            </nav>
        </div> 

        <div id = "container">
            <div class = "calendar-container">
                <div id = "calendar">
                    <header class = "calendar-header">
                        <p class = "calendar-current-date"></p>
                        <div class = "calendar-navigation">
                            <span id = "calendar-prev" class = "material-symbols-rounded">Chevron_left</span>
                            <span id = "calendar-next" class = "material-symbols-rounded">Chevron_right</span>
                        </div>
                    </header>
                    <div class = "calendar-body">
                        <ul class = "calendar-weekdays">
                            <li>Sun</li>
                            <li>Mon</li>
                            <li>Tue</li>
                            <li>Wed</li>
                            <li>Thu</li>
                            <li>Fri</li>
                            <li>Sat</li>
                        </ul>
                        <ul class = "calendar-dates">

                        </ul>
                    </div>
                </div>
            </div>

            <div id = "To-Do-container">
                <div id = "To-Do">
                    <h1>To-Do List</h1>
                    <div class = "input-section">
                        <input type = "text" id = "taskInput" placeholder="Add your text">
                        <button id = "addTask" onclick = "addTask()">Add</button>
                    </div>
        
                    <ul id = "taskList"></ul>
                    <button id = "start_work" onclick = "redirectToTimer()">Start Working</button>
                </div>
            </div>
            
        </div>

        <script src = "To-Do-script.js"></script>
    </body>
</html>
